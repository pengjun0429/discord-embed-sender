<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Embed 視覺化訊息編輯器 - 玻璃擬態版</title>
    <style>
        /* 全局樣式：使用深色背景和毛玻璃基礎配置 */
        body {
            background: linear-gradient(135deg, #1f2235, #121421);
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            backdrop-filter: blur(5px); /* 背景輕微模糊 */
        }

        /* 玻璃擬態面板容器 */
        .glass-panel {
            background: rgba(255, 255, 255, 0.05); /* 半透明白色背景 */
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px); /* 關鍵：毛玻璃模糊效果 */
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1); /* 輕微邊框 */
            padding: 2rem;
            width: 80%;
            max-width: 1000px;
            display: flex;
            gap: 2rem;
        }

        /* 控制台樣式 */
        .control-panel {
            flex: 1;
        }

        .control-panel h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .input-group {
            margin-bottom: 1rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.3rem;
            color: #ddd;
        }

        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 0.7rem;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 1rem;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .input-group input:focus,
        .input-group textarea:focus {
            outline: none;
            border-color: #5865F2; /* Discord 藍色聚焦 */
            box-shadow: 0 0 10px rgba(88, 101, 242, 0.5);
        }

        /* 霓虹燈按鈕樣式 */
        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .button-group button {
            flex: 1;
            padding: 1rem;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .send-btn {
            background-color: transparent;
            color: #5865F2;
            border: 2px solid #5865F2 !important;
            box-shadow: 0 0 10px rgba(88, 101, 242, 0.3);
        }

        .send-btn:hover {
            background-color: #5865F2;
            color: white;
            box-shadow: 0 0 20px rgba(88, 101, 242, 0.7);
        }

        .copy-btn {
            background-color: transparent;
            color: white;
            border: 2px solid white !important;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .copy-btn:hover {
            background-color: white;
            color: #121421;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.7);
        }

        /* 預覽區樣式 */
        .preview-panel {
            flex: 1;
            background: rgba(0, 0, 0, 0.2); /* 深色背景更像 Discord */
            border-radius: 8px;
            padding: 1rem;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .preview-panel h3 {
            text-align: center;
            color: #aaa;
            margin-bottom: 1rem;
        }

        /* 虛擬 Discord Embed 樣式 */
        .discord-message {
            background-color: #313338; /* Discord 訊息背景色 */
            border-radius: 4px;
            padding: 1rem;
            font-family: 'gg sans', 'Noto Sans', sans-serif;
        }

        .discord-embed {
            border-left: 4px solid #5865F2; /* 預設邊框顏色 */
            background-color: #2b2d31; /* Embed 背景色 */
            padding: 0.5rem 1rem;
            border-radius: 4px;
        }

        .discord-embed-title {
            color: white;
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 0.5rem;
        }

        .discord-embed-description {
            color: #dbdee1;
            font-size: 0.875rem;
            line-height: 1.375rem;
        }

        /* 裝飾性氣泡 */
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            z-index: -1;
        }
    </style>
</head>

                </div>
            </div>
        </div>
    </div>
