<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Embed 發送器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Discord Embed 視覺化發送器</h2>
        
        <label>Webhook 網址：</label>
        <input type="text" id="webhook-url" placeholder="請貼上 Discord Webhook URL">

        <label>機器人名稱：</label>
        <input type="text" id="bot-name" placeholder="預設：萬用發送器">

        <label>Embed 標題：</label>
        <input type="text" id="embed-title" placeholder="請輸入標題">

        <label>Embed 內容（敘述）：</label>
        <textarea id="embed-desc" rows="5" placeholder="請輸入主要內容..."></textarea>

        <label>邊框顏色：</label>
        <input type="color" id="embed-color" value="#5865F2">

        <button id="send-btn">發送訊息到 Discord</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
